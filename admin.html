<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex, nofollow">
<title>Panel de reservas — Admin</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,600;0,9..40,700;0,9..40,800;1,9..40,400&display=swap" rel="stylesheet">
<style>
  :root{
    --bg: #080810;
    --bg-soft: #111120;
    --bg-card: #14141F;
    --accent: #FF2D78;
    --accent-soft: #FF6FA5;
    --text: #F4F2EF;
    --text-dim: #7A7890;
    --line: #1E1E2E;
    --gold: #FFD166;
    --green: #3DDC84;
  }
  *{box-sizing:border-box; margin:0; padding:0;}
  body{
    background:var(--bg); color:var(--text);
    font-family:'DM Sans', sans-serif;
    min-height:100vh;
    padding:24px 16px 60px;
  }
  .wrap{max-width:720px; margin:0 auto;}

  /* ── LOGIN ── */
  .login-screen{
    min-height:80vh; display:flex; flex-direction:column;
    align-items:center; justify-content:center; text-align:center; gap:18px;
  }
  .login-icon{font-size:40px;}
  .login-title{font-family:'Bebas Neue', sans-serif; font-size:26px; letter-spacing:1px;}
  .login-sub{color:var(--text-dim); font-size:14px; max-width:280px;}
  .login-input{
    width:260px; padding:14px 16px; border-radius:12px;
    background:var(--bg-soft); border:1px solid var(--line);
    color:var(--text); font-size:15px; font-family:'DM Sans', sans-serif;
    text-align:center; letter-spacing:2px;
  }
  .login-input:focus{outline:none; border-color:var(--accent-soft);}
  .login-btn{
    width:260px; padding:14px 16px; border-radius:12px;
    background:var(--accent); border:none; color:#fff;
    font-size:15px; font-weight:700; font-family:'DM Sans', sans-serif;
    cursor:pointer; transition:opacity .15s ease;
  }
  .login-btn:hover{opacity:0.88;}
  .login-error{color:var(--accent-soft); font-size:13px; min-height:16px;}

  /* ── PANEL ── */
  .panel{display:none;}
  .panel.show{display:block;}
  .panel-header{
    display:flex; justify-content:space-between; align-items:flex-start;
    margin-bottom:6px; gap:12px;
  }
  .panel-title{font-family:'Bebas Neue', sans-serif; font-size:28px; letter-spacing:1px;}
  .panel-sub{color:var(--text-dim); font-size:13.5px; margin-bottom:22px;}
  .logout-btn{
    background:transparent; border:1px solid var(--line); color:var(--text-dim);
    font-size:12px; padding:8px 14px; border-radius:8px; cursor:pointer;
    font-family:'DM Sans', sans-serif; white-space:nowrap;
  }
  .logout-btn:hover{border-color:rgba(255,45,120,0.35); color:var(--accent-soft);}

  .stats-row{display:grid; grid-template-columns:1fr 1fr 1fr; gap:10px; margin-bottom:24px;}
  .stat-box{
    background:var(--bg-card); border:1px solid var(--line); border-radius:14px;
    padding:14px 10px; text-align:center;
  }
  .stat-num{font-family:'Bebas Neue', sans-serif; font-size:24px; color:var(--accent-soft); line-height:1;}
  .stat-label{font-size:10.5px; color:var(--text-dim); margin-top:4px; letter-spacing:0.03em;}

  .filter-row{display:flex; gap:8px; margin-bottom:16px; flex-wrap:wrap;}
  .filter-input{
    flex:1; min-width:160px; padding:11px 14px; border-radius:10px;
    background:var(--bg-soft); border:1px solid var(--line);
    color:var(--text); font-size:13.5px; font-family:'DM Sans', sans-serif;
  }
  .filter-input:focus{outline:none; border-color:var(--accent-soft);}
  .refresh-btn{
    padding:11px 16px; border-radius:10px; background:var(--bg-soft);
    border:1px solid var(--line); color:var(--text-dim); font-size:13px;
    cursor:pointer; font-family:'DM Sans', sans-serif; white-space:nowrap;
  }
  .refresh-btn:hover{border-color:rgba(255,45,120,0.35); color:var(--accent-soft);}

  .empty-state{
    text-align:center; padding:50px 20px; color:var(--text-dim); font-size:14px;
  }

  .res-list{display:flex; flex-direction:column; gap:10px;}
  .res-card{
    background:var(--bg-card); border:1px solid var(--line); border-radius:14px;
    padding:16px 18px; display:flex; justify-content:space-between; gap:14px;
    align-items:flex-start;
  }
  .res-main{flex:1; min-width:0;}
  .res-seat{
    display:inline-flex; align-items:center; gap:6px;
    font-family:'Bebas Neue', sans-serif; font-size:13px; letter-spacing:0.5px;
    color:var(--gold); margin-bottom:6px;
  }
  .res-name{font-weight:800; font-size:15.5px; color:var(--text); margin-bottom:3px;}
  .res-rubro{font-size:13px; color:var(--accent-soft); margin-bottom:8px;}
  .res-meta{font-size:11.5px; color:var(--text-dim); display:flex; gap:10px; flex-wrap:wrap;}
  .res-meta span{display:inline-flex; align-items:center; gap:4px;}
  .pago-tag{
    display:inline-block; padding:2px 8px; border-radius:6px;
    background:rgba(61,220,132,0.12); color:var(--green); font-size:10.5px; font-weight:700;
  }
  .pago-tag.efectivo{background:rgba(255,209,102,0.12); color:var(--gold);}

  .release-btn{
    background:rgba(255,45,120,0.1); border:1px solid rgba(255,45,120,0.3);
    color:var(--accent-soft); font-size:12px; font-weight:700;
    padding:9px 14px; border-radius:9px; cursor:pointer; white-space:nowrap;
    font-family:'DM Sans', sans-serif; transition:all .15s ease;
  }
  .release-btn:hover{background:rgba(255,45,120,0.2);}
  .release-btn:disabled{opacity:0.4; cursor:wait;}

  .toast{
    position:fixed; bottom:24px; left:50%; transform:translateX(-50%) translateY(20px);
    background:var(--bg-card); border:1px solid var(--line); border-radius:12px;
    padding:12px 20px; font-size:13.5px; color:var(--text);
    opacity:0; transition:all .25s ease; pointer-events:none; z-index:50;
    box-shadow:0 8px 30px rgba(0,0,0,0.4);
  }
  .toast.show{opacity:1; transform:translateX(-50%) translateY(0);}

  .conn-dot{display:inline-block; width:7px; height:7px; border-radius:50%; margin-right:5px;}
  .conn-dot.ok{background:var(--green); box-shadow:0 0 6px var(--green);}
  .conn-dot.bad{background:var(--accent); box-shadow:0 0 6px var(--accent);}
  .conn-status{font-size:11.5px; color:var(--text-dim); margin-bottom:18px; display:flex; align-items:center;}
</style>
</head>
<body>

<div class="wrap">

  <!-- ══ LOGIN ══ -->
  <div class="login-screen" id="loginScreen">
    <div class="login-icon">🔒</div>
    <div class="login-title">PANEL DE RESERVAS</div>
    <div class="login-sub">Inicia sesión con tu cuenta de administrador para ver y gestionar los asientos reservados.</div>
    <input type="email" class="login-input" id="adminEmailInput" placeholder="Correo" autocomplete="off" style="text-align:left; letter-spacing:0;">
    <input type="password" class="login-input" id="adminKeyInput" placeholder="Contraseña" autocomplete="off">
    <button class="login-btn" id="loginBtn">Entrar</button>
    <div class="login-error" id="loginError"></div>
  </div>

  <!-- ══ PANEL ══ -->
  <div class="panel" id="panel">
    <div class="panel-header">
      <div>
        <div class="panel-title">PANEL DE RESERVAS</div>
        <div class="panel-sub">Taller "Creación de Contenido Viral" · Gestiona los cupos en tiempo real</div>
      </div>
      <button class="logout-btn" id="logoutBtn">Salir</button>
    </div>

    <div class="conn-status" id="connStatus"><span class="conn-dot bad" id="connDot"></span>Conectando a Firebase…</div>

    <div class="stats-row">
      <div class="stat-box">
        <div class="stat-num" id="statOcupados">0</div>
        <div class="stat-label">OCUPADOS</div>
      </div>
      <div class="stat-box">
        <div class="stat-num" id="statLibres">49</div>
        <div class="stat-label">LIBRES</div>
      </div>
      <div class="stat-box">
        <div class="stat-num" id="statYape">0</div>
        <div class="stat-label">PAGAN YAPE</div>
      </div>
    </div>

    <div class="filter-row">
      <input type="text" class="filter-input" id="searchInput" placeholder="Buscar por nombre o rubro…">
      <button class="refresh-btn" id="refreshBtn">↻ Actualizar</button>
    </div>

    <div id="resListContainer">
      <div class="empty-state" id="emptyState">Aún no hay reservas registradas.</div>
      <div class="res-list" id="resList"></div>
    </div>
  </div>

</div>

<div class="toast" id="toast"></div>

<script type="module">
  /* ══════════════════════════════════════════════════
     👉 MISMA CONFIGURACIÓN DE FIREBASE QUE EN index.html
     Copia aquí exactamente el mismo objeto FIREBASE_CONFIG
     que pusiste en el sitio principal — deben apuntar a la
     misma base de datos para que coincidan las reservas.

     👉 LOGIN: este panel usa Firebase Authentication real
     (no una clave escrita en el código). Sigue la guía
     FIREBASE_SETUP.md para crear tu usuario admin (correo +
     contraseña) desde la consola de Firebase y configurar
     las reglas de seguridad — eso es lo que de verdad protege
     los datos, incluso con este archivo en GitHub público.
     ════════════════════════════════════════════════ */
  const FIREBASE_CONFIG = {
    apiKey:            "AIzaSyCT7YBozgzJnqqS6rUBptqLostUKV2t6g8",
    authDomain:        "taller-viral-1f16c.firebaseapp.com",
    databaseURL:       "https://taller-viral-1f16c-default-rtdb.firebaseio.com",
    projectId:         "taller-viral-1f16c",
    storageBucket:     "taller-viral-1f16c.firebasestorage.app",
    messagingSenderId: "866940748045",
    appId:             "1:866940748045:web:bf3c6fc0c9f5c0a544f044"
  };

  const DB_PATH = "asientos";

  let allReservas = {}; // { idx: {nombre, rubro, pago, fecha, fila, numero} }
  let dbInstance = null;
  let dbRef = null;
  let removeFn = null;
  let authInstance = null;

  /* ── LOGIN ── */
  const loginScreen   = document.getElementById('loginScreen');
  const panel         = document.getElementById('panel');
  const emailInput    = document.getElementById('adminEmailInput');
  const keyInput      = document.getElementById('adminKeyInput');
  const loginBtn      = document.getElementById('loginBtn');
  const loginError    = document.getElementById('loginError');

  let signInFn = null; // se asigna cuando carga el módulo de Auth

  function tryLogin(){
    if(!signInFn){
      loginError.textContent = 'Cargando… inténtalo en un segundo.';
      return;
    }
    const email = emailInput.value.trim();
    const pass  = keyInput.value;
    if(!email || !pass){
      loginError.textContent = 'Completa tu correo y contraseña.';
      return;
    }
    loginBtn.disabled = true;
    loginBtn.textContent = 'Entrando…';
    signInFn(email, pass).then(() => {
      // onAuthStateChanged se encarga de mostrar el panel
    }).catch(err => {
      console.warn(err);
      loginError.textContent = 'Correo o contraseña incorrectos.';
      keyInput.value = '';
      loginBtn.disabled = false;
      loginBtn.textContent = 'Entrar';
    });
  }
  loginBtn.addEventListener('click', tryLogin);
  keyInput.addEventListener('keydown', e => { if(e.key === 'Enter') tryLogin(); });
  emailInput.addEventListener('keydown', e => { if(e.key === 'Enter') tryLogin(); });

  document.getElementById('logoutBtn').addEventListener('click', () => {
    if(authInstance) authInstance.signOut();
  });

  /* ── FIREBASE (App + Auth + Database) ── */
  Promise.all([
    import('https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js'),
    import('https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js'),
    import('https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js')
  ]).then(([appMod, dbMod, authMod]) => {
    const { initializeApp } = appMod;
    const { getDatabase, ref, onValue, set } = dbMod;
    const { getAuth, signInWithEmailAndPassword, onAuthStateChanged, signOut } = authMod;

    const app = initializeApp(FIREBASE_CONFIG);
    dbInstance = getDatabase(app);
    dbRef = ref(dbInstance, DB_PATH);
    const auth = getAuth(app);
    authInstance = { signOut: () => signOut(auth) };

    signInFn = (email, pass) => signInWithEmailAndPassword(auth, email, pass);
    removeFn = (idx) => set(ref(dbInstance, `${DB_PATH}/${idx}`), null);

    // Reacciona a sesión iniciada / cerrada
    onAuthStateChanged(auth, (user) => {
      loginBtn.disabled = false;
      loginBtn.textContent = 'Entrar';
      if(user){
        loginScreen.style.display = 'none';
        panel.classList.add('show');
        attachDataListener();
      } else {
        loginScreen.style.display = 'flex';
        panel.classList.remove('show');
      }
    });
  }).catch(err => {
    console.warn('Firebase no cargó:', err);
    loginError.textContent = 'No se pudo cargar Firebase. Revisa FIREBASE_CONFIG.';
  });

  /* ── ESCUCHA DE DATOS (solo corre tras login exitoso) ── */
  let listenerAttached = false;
  function attachDataListener(){
    const connDot = document.getElementById('connDot');
    const connStatus = document.getElementById('connStatus');
    if(listenerAttached) return;
    listenerAttached = true;

    import('https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js').then(({onValue}) => {
      onValue(dbRef, (snapshot) => {
        connDot.classList.remove('bad'); connDot.classList.add('ok');
        connStatus.innerHTML = '<span class="conn-dot ok"></span>Conectado · datos en tiempo real';
        allReservas = snapshot.val() || {};
        renderList();
      }, (err) => {
        connDot.classList.remove('ok'); connDot.classList.add('bad');
        connStatus.innerHTML = '<span class="conn-dot bad"></span>Error de conexión a Firebase';
        console.warn(err);
      });
    });
  }

  /* ── RENDER ── */
  function fmtFecha(iso){
    if(!iso) return '—';
    try{
      const d = new Date(iso);
      return d.toLocaleString('es-PE', {day:'2-digit', month:'short', hour:'2-digit', minute:'2-digit'});
    }catch(e){ return '—'; }
  }

  function renderList(){
    const list = document.getElementById('resList');
    const empty = document.getElementById('emptyState');
    const search = document.getElementById('searchInput').value.trim().toLowerCase();

    const entries = Object.keys(allReservas)
      .map(k => ({idx: Number(k), data: allReservas[k]}))
      .filter(e => e.data) // ignora nodos vacíos
      .sort((a,b) => {
        const fa = (typeof a.data === 'object' && a.data.fecha) ? a.data.fecha : '';
        const fb = (typeof b.data === 'object' && b.data.fecha) ? b.data.fecha : '';
        return fb.localeCompare(fa); // más recientes primero
      });

    const filtered = entries.filter(e => {
      if(!search) return true;
      const nombre = (typeof e.data === 'object' ? e.data.nombre : '') || '';
      const rubro  = (typeof e.data === 'object' ? e.data.rubro  : '') || '';
      return nombre.toLowerCase().includes(search) || rubro.toLowerCase().includes(search);
    });

    // Stats
    const total = entries.length;
    document.getElementById('statOcupados').textContent = total;
    document.getElementById('statLibres').textContent = Math.max(49 - total, 0);
    const yapeCount = entries.filter(e => typeof e.data === 'object' && e.data.pago === 'Yape').length;
    document.getElementById('statYape').textContent = yapeCount;

    list.innerHTML = '';
    if(filtered.length === 0){
      empty.style.display = 'block';
      empty.textContent = total === 0 ? 'Aún no hay reservas registradas.' : 'No hay resultados para esa búsqueda.';
      return;
    }
    empty.style.display = 'none';

    filtered.forEach(({idx, data}) => {
      const isLegacy = typeof data !== 'object'; // reservas viejas guardadas solo como "true"
      const fila   = isLegacy ? (Math.floor(idx/7)+1) : (data.fila ?? Math.floor(idx/7)+1);
      const numero = isLegacy ? ((idx%7)+1) : (data.numero ?? (idx%7)+1);
      const nombre = isLegacy ? '(sin datos — reserva antigua)' : (data.nombre || '—');
      const rubro  = isLegacy ? '' : (data.rubro || '');
      const pago   = isLegacy ? '' : (data.pago || '');
      const fecha  = isLegacy ? '' : fmtFecha(data.fecha);

      const card = document.createElement('div');
      card.className = 'res-card';
      card.innerHTML = `
        <div class="res-main">
          <div class="res-seat">💺 FILA ${fila} · N°${numero}</div>
          <div class="res-name">${escapeHtml(nombre)}</div>
          ${rubro ? `<div class="res-rubro">${escapeHtml(rubro)}</div>` : ''}
          <div class="res-meta">
            ${pago ? `<span class="pago-tag ${pago.toLowerCase()==='efectivo'?'efectivo':''}">${escapeHtml(pago)}</span>` : ''}
            ${fecha ? `<span>🕒 ${fecha}</span>` : ''}
          </div>
        </div>
        <button class="release-btn" data-idx="${idx}">Liberar ✕</button>
      `;
      list.appendChild(card);
    });

    list.querySelectorAll('.release-btn').forEach(btn => {
      btn.addEventListener('click', () => releaseAsiento(btn));
    });
  }

  function escapeHtml(str){
    const div = document.createElement('div');
    div.textContent = str;
    return div.innerHTML;
  }

  /* ── LIBERAR ASIENTO ── */
  function releaseAsiento(btn){
    const idx = btn.dataset.idx;
    const fila   = Math.floor(Number(idx)/7)+1;
    const numero = (Number(idx)%7)+1;
    if(!confirm(`¿Liberar el asiento Fila ${fila}, N°${numero}? Quedará disponible para otra persona.`)) return;

    btn.disabled = true;
    btn.textContent = 'Liberando…';

    if(!removeFn){
      showToast('No hay conexión a Firebase todavía.');
      btn.disabled = false; btn.textContent = 'Liberar ✕';
      return;
    }

    removeFn(idx).then(() => {
      showToast(`Asiento Fila ${fila}, N°${numero} liberado ✓`);
    }).catch(err => {
      console.warn(err);
      showToast('No se pudo liberar. Intenta de nuevo.');
      btn.disabled = false; btn.textContent = 'Liberar ✕';
    });
  }

  function showToast(msg){
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 2600);
  }

  /* ── BUSCAR / REFRESCAR ── */
  document.getElementById('searchInput').addEventListener('input', renderList);
  document.getElementById('refreshBtn').addEventListener('click', renderList);
</script>
</body>
</html>
